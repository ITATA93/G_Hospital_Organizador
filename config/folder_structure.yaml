# =============================================================================
# folder_structure.yaml
# Estructura de carpetas del Sistema SAIA
# Hospital Provincial del Limari - Ovalle, Chile
#
# Define la jerarquia de carpetas para la organizacion documental
# por Unidad Hospitalaria, Ano y Tipo de Documento.
#
# Uso: src/organizer.py lee esta configuracion para crear la estructura
# de archivado automatizado.
# =============================================================================

version: "1.0.0"
institucion: "Hospital Provincial del Limari"
ciudad: "Ovalle"
region: "Region de Coquimbo"
sistema: "SAIA - Sistema de Apoyo Integral de Archivos"

# ---------------------------------------------------------------------------
# Unidades Hospitalarias (Estructura Nivel 1)
# ---------------------------------------------------------------------------
# Cada unidad genera y recibe documentos administrativos que deben
# archivarse de forma independiente.

