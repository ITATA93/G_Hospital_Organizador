    codigo: "URG"
    descripcion: "Servicio de Urgencia Hospitalaria"
    responsable: "Jefe de Urgencia"
    subcarpetas:
      - Protocolos
      - Manuales
      - Normas
      - Actas
      - Informes
      - Memorandums
      - Ordinarios
      - Circulares
      - Planillas
      - Varios
