# ---------------------------------------------------------------------------
# Tipos de Documentos (Estructura Nivel 3 dentro de cada Unidad)
# ---------------------------------------------------------------------------

tipos_documento:
  Protocolos:
    descripcion: "Protocolos clinicos y administrativos"
    extensiones_comunes: [".pdf", ".docx"]
    patrones:
      - "protocolo"
      - "prot[._-]"

  Manuales:
    descripcion: "Manuales de procedimiento e instructivos"
    extensiones_comunes: [".pdf", ".docx"]
    patrones:
      - "manual"
      - "instructivo"
      - "procedimiento"

  Normas:
    descripcion: "Normativa, reglamentos y regulaciones"
    extensiones_comunes: [".pdf", ".docx"]
    patrones:
      - "norma"
      - "reglamento"
      - "decreto"

  Actas:
    descripcion: "Actas de reunion y minutas"
    extensiones_comunes: [".pdf", ".docx", ".xlsx"]
    patrones:
      - "acta"
      - "minuta"
      - "reunion"

  Informes:
    descripcion: "Informes tecnicos, de gestion y evaluaciones"
    extensiones_comunes: [".pdf", ".docx", ".xlsx"]
    patrones:
      - "informe"
      - "reporte"
      - "analisis"

  Memorandums:
    descripcion: "Comunicaciones internas oficiales"
    extensiones_comunes: [".pdf", ".docx"]
    patrones:
      - "memo"
      - "memorandum"

  Ordinarios:
    descripcion: "Comunicaciones externas oficiales"
    extensiones_comunes: [".pdf", ".docx"]
    patrones:
      - "ordinario"
      - "oficio"

  Resoluciones:
    descripcion: "Actos administrativos resolutivos"
    extensiones_comunes: [".pdf"]
    patrones:
      - "resolucion"
      - "rex"
      - "decreto"

  Circulares:
    descripcion: "Instrucciones generales y comunicados"
    extensiones_comunes: [".pdf", ".docx"]
    patrones:
      - "circular"
      - "comunicado"

  Contratos:
    descripcion: "Contratos, convenios y licitaciones"
    extensiones_comunes: [".pdf", ".docx"]
    patrones:
      - "contrato"
      - "convenio"
      - "licitacion"

  Facturas:
    descripcion: "Documentos tributarios (facturas, boletas, OC)"
    extensiones_comunes: [".pdf", ".xlsx"]
    patrones:
      - "factura"
      - "boleta"
      - "orden compra"

  Planillas:
    descripcion: "Planillas, registros y bases de datos tabulares"
    extensiones_comunes: [".xlsx", ".xls", ".csv"]
    patrones:
      - "planilla"
      - "registro"

  Presentaciones:
    descripcion: "Presentaciones y material de capacitacion"
    extensiones_comunes: [".pptx", ".ppt", ".pdf"]
    patrones:
      - "presentacion"
      - "capacitacion"

  Varios:
    descripcion: "Documentos no clasificados automaticamente"
    extensiones_comunes: ["*"]
    patrones: []

# ---------------------------------------------------------------------------
# Estructura de Directorios SAIA
# ---------------------------------------------------------------------------
# Patron: {raiz_saia}/{unidad}/{anio}/{tipo_documento}/{archivo}
#
# Ejemplo:
#   _Estructura_Final_SAIA/
#     Urgencia/
#       2026/
#         Protocolos/
#           protocolo_triage_2026.pdf
#         Informes/
#           informe_gestion_enero_2026.xlsx
#     Direccion/
#       2026/
#         Resoluciones/
#           rex_001_2026.pdf
#         Memorandums/
#           memo_presupuesto_2026.docx

estructura:
  raiz: "_Estructura_Final_SAIA"
  patron: "{unidad}/{anio}/{tipo_documento}"
  anio_actual: 2026
  anios_retroactivos: 5  # Organizar documentos desde 2021

# ---------------------------------------------------------------------------
# Reglas de Retencion Documental
# ---------------------------------------------------------------------------
# Basado en normativa chilena (Ley 20.285 Transparencia, Ley 19.628 Datos)

retencion:
  Protocolos:
    periodo_anos: 10
    obligatorio: true
    nota: "Mantener mientras el protocolo este vigente + 5 anos"
  Resoluciones:
    periodo_anos: 10
    obligatorio: true
    nota: "Archivo permanente del Servicio de Salud"
  Contratos:
    periodo_anos: 6
    obligatorio: true
    nota: "Segun Ley 19.886 de Compras Publicas"
  Facturas:
    periodo_anos: 6
    obligatorio: true
    nota: "SII requiere 6 anos de respaldo tributario"
  Informes:
    periodo_anos: 5
    obligatorio: false
  Memorandums:
    periodo_anos: 3
    obligatorio: false
  Actas:
    periodo_anos: 5
    obligatorio: true
    nota: "Comites de calidad y seguridad requieren respaldo"
  Varios:
    periodo_anos: 2
    obligatorio: false
